<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catarina & Morão</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background:#fdfaf7;
  color:#2c2c2c;
  line-height:1.6;
}

section {
  padding:100px 20px;
  max-width:1000px;
  margin:auto;
  text-align:center;
}

h1,h2,h3 {
  font-family:'Playfair Display', serif;
}

h1 {
  font-size:3.5rem;
  margin-bottom:10px;
}

.subtitle {
  font-size:1.2rem;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.7;
}

#countdown {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
  font-size:1.5rem;
}

#countdown div {
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  min-width:90px;
}

.hero {
  background:linear-gradient(to bottom, #ffffff, #fdfaf7);
  padding-top:150px;
}

.details-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  margin-top:60px;
}

.card {
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
}

.map-container {
  margin-top:40px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

iframe {
  width:100%;
  height:400px;
  border:0;
}

.rsvp form {
  margin-top:40px;
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:400px;
  margin-left:auto;
  margin-right:auto;
}

input, select {
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:1rem;
}

button {
  padding:12px;
  border:none;
  background:#2c2c2c;
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  opacity:0.85;
}

footer {
  padding:40px;
  text-align:center;
  background:#f2ede9;
  font-size:0.9rem;
}
</style>
</head>

<body>

<section class="hero">
  <h1>Catarina & Morão</h1>
  <div class="subtitle">31 Julho 2027 • Lisboa</div>

  <div id="countdown">
    <div><span id="days">0</span><br>Dias</div>
    <div><span id="hours">0</span><br>Horas</div>
    <div><span id="minutes">0</span><br>Min</div>
    <div><span id="seconds">0</span><br>Seg</div>
  </div>
</section>

<section>
  <h2>Entra (A)gosto</h2>
  <div class="details-grid">
    <div class="card">
      <h3>Cerimónia</h3>
      <p>15:00</p>
      <p>Igreja de São Exemplo</p>
      <p>Lisboa</p>
    </div>

    <div class="card">
      <h3>Festa</h3>
      <p>17:30</p>
      <p>Quinta Muito Bonita</p>
      <p>Jantar & Música</p>
    </div>

    <div class="card">
      <h3>Dress Code</h3>
      <p>Formal Elegante</p>
    </div>
  </div>
</section>

<section>
  <h2>Localização</h2>
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d11108.250395774612!2d-8.648540885988366!3d38.78182174169464!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd190e37f311142f%3A0x1eaa9fb86b8d5d53!2sHerdade%20do%20Moinho%20Novo!5e0!3m2!1spt-PT!2spt!4v1700000000000!5m2!1spt-PT!2spt"
        width="100%"
        height="350"
        style="border:0;"
        allowfullscreen=""
        loading="lazy"
    ></iframe>
  </div>
</section>

<section class="rsvp">
  <h2>Confirmação de Presença</h2>

  <form>
    <input type="text" placeholder="Nome completo" required>
    <select required>
      <option value="">Vai estar presente?</option>
      <option>Sim, claro!</option>
      <option>Infelizmente não</option>
    </select>
    <input type="number" placeholder="Número de acompanhantes">
    <button type="submit">Enviar</button>
  </form>
</section>

<footer>
  Feito com amor 🤍 • Catarina & Morão 2027
</footer>

<script>
const weddingDate = new Date("2027-07-31T15:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = weddingDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("minutes").textContent = minutes;
  document.getElementById("seconds").textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
